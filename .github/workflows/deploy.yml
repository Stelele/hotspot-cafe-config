name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: docker compose config

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  render:
    name: Render Compose File
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          for secret in RADIUS_DB_ROOT_PASSWORD RADIUS_DB_PASSWORD DROPLET_IP WG_EASY_PASSWORD_HASH; do
            if [ -z "${!secret}" ]; then
              missing+=("$secret")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 1
          fi
        env:
          RADIUS_DB_ROOT_PASSWORD: ${{ secrets.RADIUS_DB_ROOT_PASSWORD }}
          RADIUS_DB_PASSWORD: ${{ secrets.RADIUS_DB_PASSWORD }}
          DROPLET_IP: ${{ secrets.DROPLET_IP }}
          WG_EASY_PASSWORD_HASH: ${{ secrets.WG_EASY_PASSWORD_HASH }}

      - name: Render docker-compose.yml
        run: |
          python3 << 'PYEOF'
          import os, sys

          with open('docker-compose.yml', 'r') as f:
              content = f.read()

          replacements = {
              '{{RADIUS_DB_ROOT_PASSWORD}}': os.environ['RADIUS_DB_ROOT_PASSWORD'],
              '{{RADIUS_DB_PASSWORD}}': os.environ['RADIUS_DB_PASSWORD'],
              '{{DROPLET_IP}}': os.environ['DROPLET_IP'],
              '{{WG_EASY_PASSWORD_HASH}}': os.environ['WG_EASY_PASSWORD_HASH'],
          }

          for placeholder, value in replacements.items():
              if not value:
                  print(f"ERROR: Secret for {placeholder} is empty")
                  sys.exit(1)
              content = content.replace(placeholder, value)

          with open('docker-compose.rendered.yml', 'w') as f:
              f.write(content)
          print("Rendered docker-compose.yml successfully")
          PYEOF
        env:
          RADIUS_DB_ROOT_PASSWORD: ${{ secrets.RADIUS_DB_ROOT_PASSWORD }}
          RADIUS_DB_PASSWORD: ${{ secrets.RADIUS_DB_PASSWORD }}
          DROPLET_IP: ${{ secrets.DROPLET_IP }}
          WG_EASY_PASSWORD_HASH: ${{ secrets.WG_EASY_PASSWORD_HASH }}

      - name: Upload rendered compose file
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifact
          path: docker-compose.rendered.yml
          retention-days: 1

  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: render
    timeout-minutes: 15
    steps:
      - name: Download rendered compose file
        uses: actions/download-artifact@v4
        with:
          name: deploy-artifact

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Add droplet to known hosts
        run: ssh-keyscan -T 5 -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Backup current compose on droplet
        run: |
          ssh ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
            "cd ~/cafe-radius && cp docker-compose.yml docker-compose.yml.bak 2>/dev/null || true"

      - name: SCP rendered compose to droplet
        run: |
          scp docker-compose.rendered.yml \
            ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:~/cafe-radius/docker-compose.yml

      - name: Restart containers
        run: |
          ssh ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
            "cd ~/cafe-radius && docker compose pull && docker compose down && docker compose up -d"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Add droplet to known hosts
        run: ssh-keyscan -T 5 -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Wait for services to start
        run: |
          echo "Waiting for services to become healthy..."
          for i in $(seq 30); do
            if ssh ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} "curl -sf http://127.0.0.1:80 > /dev/null 2>&1"; then
              echo "daloRADIUS is responding after $((i * 2)) seconds"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Services failed to start within 60 seconds"
              exit 1
            fi
            sleep 2
          done

      - name: Run smoke tests
        run: |
          ssh ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} bash -s << 'EOF'
            set -e

            echo "Checking container health..."
            cd ~/cafe-radius
            docker compose ps --format '{{.State}}' | while read -r state; do
              if echo "$state" | grep -qi "running"; then
                echo "  OK: Container is running ($state)"
              else
                echo "  FAIL: Container state: $state"
                exit 1
              fi
            done

            echo "Testing daloRADIUS HTTP (port 80)..."
            curl -sf http://127.0.0.1:80 > /dev/null && echo "  OK" || { echo "  FAIL"; exit 1; }

            echo "Testing wg-easy GUI HTTP (port 51821)..."
            curl -sf http://127.0.0.1:51821 > /dev/null && echo "  OK" || { echo "  FAIL"; exit 1; }

            echo "Testing RADIUS Auth (port 1812/udp)..."
            echo -n "" | timeout 5 bash -c 'cat > /dev/udp/127.0.0.1/1812' 2>/dev/null && echo "  OK" || { echo "  FAIL"; exit 1; }

            echo "Testing RADIUS Acct (port 1813/udp)..."
            echo -n "" | timeout 5 bash -c 'cat > /dev/udp/127.0.0.1/1813' 2>/dev/null && echo "  OK" || { echo "  FAIL"; exit 1; }

            echo "Testing WireGuard (port 51820/udp)..."
            echo -n "" | timeout 5 bash -c 'cat > /dev/udp/127.0.0.1/51820' 2>/dev/null && echo "  OK" || { echo "  FAIL"; exit 1; }

            echo "All smoke tests passed!"
          EOF

  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: always() && (needs.deploy.result == 'failure' || needs.smoke-test.result == 'failure')
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Add droplet to known hosts
        run: ssh-keyscan -T 5 -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Restore previous compose and restart
        run: |
          ssh ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} bash -s << 'EOF'
            cd ~/cafe-radius
            if [ -f docker-compose.yml.bak ]; then
              cp docker-compose.yml.bak docker-compose.yml
              docker compose down
              docker compose up -d
              echo "Rollback completed successfully."
            else
              echo "::error::No backup found on droplet. Cannot rollback."
              exit 1
            fi
          EOF

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test, rollback]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Report workflow status
        run: |
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          SMOKE_STATUS="${{ needs.smoke-test.result }}"
          ROLLBACK_STATUS="${{ needs.rollback.result }}"

          if [ "$SMOKE_STATUS" = "success" ]; then
            echo "::notice::Deployment succeeded. All services are running."
          elif [ "$ROLLBACK_STATUS" = "success" ]; then
            echo "::error::Deployment failed. Smoke tests failed. Rollback completed."
          elif [ "$DEPLOY_STATUS" = "failure" ]; then
            echo "::error::Deployment failed at deploy stage. No rollback needed."
          else
            echo "::error::Deployment failed. Smoke tests failed. Rollback also failed or was skipped."
          fi
