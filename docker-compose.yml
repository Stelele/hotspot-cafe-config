version: '3.8'

services:
  radius-db:
    image: mariadb:10.5
    container_name: radius-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD={{RADIUS_DB_ROOT_PASSWORD}}
      - MYSQL_DATABASE=radius
      - MYSQL_USER=radius
      - MYSQL_PASSWORD={{RADIUS_DB_PASSWORD}}
    volumes:
      - radius-db-data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro

  daloradius:
    image: stelele/daloradius:latest
    container_name: daloradius
    restart: unless-stopped
    depends_on:
      - radius-db
    ports:
      - "127.0.0.1:8082:80"
      - "1812:1812/udp"
      - "1813:1813/udp"
    environment:
      - MYSQL_HOST=radius-db
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=radius
      - MYSQL_USER=radius
      - MYSQL_PASSWORD={{RADIUS_DB_PASSWORD}}
      - TZ=Africa/Harare
    volumes:
      - daloradius-logs:/var/log/freeradius

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy
    container_name: wg-easy
    environment:
      - WG_HOST={{DROPLET_IP}}
      - PASSWORD_HASH={{WG_EASY_PASSWORD_HASH}}
      - WG_PORT=51820
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - WG_DEFAULT_DNS=1.1.1.1
    volumes:
      - wg-easy-data:/etc/wireguard
    ports:
      - "51820:51820/udp"
      - "127.0.0.1:51821:51821/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1

volumes:
  radius-db-data:
  daloradius-logs:
  wg-easy-data: